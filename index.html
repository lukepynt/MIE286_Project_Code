<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Drawing Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        .controls {
            position: fixed;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #ff4444;
            color: white;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #cc0000;
        }

        #drawingCanvas {
            display: block;
            cursor: crosshair;
            background-color: black;
        }
        
        #output {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 100;
        }

        .size-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="range"] {
            width: 100px;
        }
    </style>
</head>
<body>
    <div class="controls">

        <div class="size-control">
            <span>Size:</span>
            <input type="range" id="brushSize" min="1" max="20" value="3">
            <span id="sizeValue">3</span>
        </div>
        <button id="clearBtn">Clear</button>
    </div>
    <span id="output"></span>

    <canvas id="drawingCanvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
